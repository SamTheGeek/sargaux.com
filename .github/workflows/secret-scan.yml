name: Secret Scan

# Runs on every PR — including drafts and docs-only changes — because the scan
# is cheap and secrets can hide in markdown or config just as easily as code.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  push:
    branches: [main]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run secret scan
        run: bash scripts/secret-scan.sh
