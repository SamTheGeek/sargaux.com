name: Security Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  push:
    branches: [main]

jobs:
  security:
    name: Security, Auth & Access Control
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip tests for draft PRs
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Filter docs/config changes
        id: paths
        uses: dorny/paths-filter@v4
        with:
          filters: |
            docs:
              - '**/*.md'
              - '**/*.yml'
              - '**/*.yaml'
              - 'LICENSE'
              - '.gitignore'
              - 'playwright.config.ts'
            non_docs:
              - '**'
              - '!**/*.md'
              - '!**/*.yml'
              - '!**/*.yaml'
              - '!LICENSE'
              - '!.gitignore'
              - '!playwright.config.ts'

      - name: Determine docs-only changes
        id: filter
        run: |
          if [[ "${{ steps.paths.outputs.docs }}" == "true" && "${{ steps.paths.outputs.non_docs }}" != "true" ]]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.filter.outputs.docs_only != 'true'
        run: npm ci

      - name: Get Playwright version
        if: steps.filter.outputs.docs_only != 'true'
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: steps.filter.outputs.docs_only != 'true'
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # CI runs are always headless, so the chromium headless shell is enough
      # (roughly half the download of full chromium). Local test:install keeps
      # the full browser for headed debugging.
      - name: Install Playwright browsers
        if: steps.filter.outputs.docs_only != 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps --only-shell chromium

      - name: Install Playwright system dependencies
        if: steps.filter.outputs.docs_only != 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # No separate build step — the Playwright webServer command runs
      # `npm run build` itself, so a standalone build would run twice.
      - name: Run security tests
        if: steps.filter.outputs.docs_only != 'true'
        run: npm run test:security
        env:
          FEATURE_GLOBAL_WEDDING_SITE_ENABLED: 'true'
          FEATURE_GLOBAL_NOTION_BACKEND: 'true'
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_GUEST_LIST_DB: ${{ secrets.NOTION_GUEST_LIST_DB }}
          NOTION_EVENT_CATALOG_DB: ${{ secrets.NOTION_EVENT_CATALOG_DB }}
          NOTION_RSVP_RESPONSES_DB: ${{ secrets.NOTION_RSVP_RESPONSES_DB }}
          CALENDAR_HMAC_SECRET: ${{ secrets.CALENDAR_HMAC_SECRET }}
          SESSION_HMAC_SECRET: ${{ secrets.SESSION_HMAC_SECRET }}
          RESEND_ADMIN_SECRET: ${{ secrets.RESEND_ADMIN_SECRET }}

      - name: Upload test results
        if: steps.filter.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: security-test-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test traces
        if: steps.filter.outputs.docs_only != 'true' && failure()
        uses: actions/upload-artifact@v7
        with:
          name: security-test-traces
          path: test-results/
          retention-days: 30

      - name: Docs-only change detected; tests skipped
        if: steps.filter.outputs.docs_only == 'true'
        run: echo "Docs-only change detected; tests skipped"
