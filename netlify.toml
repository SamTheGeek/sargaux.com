# Netlify configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  FEATURE_GLOBAL_WEDDING_SITE_ENABLED = "true"
  FEATURE_GLOBAL_NOTION_BACKEND = "true"
  FEATURE_GLOBAL_CONTENT_LABELS_REMOVED = "true"
  FEATURE_GLOBAL_EMAIL_ENABLED = "true"
  FEATURE_GLOBAL_I18N = "true"
  FEATURE_NYC_DETAILS_PAGE_CONSOLIDATED = "true"
  FEATURE_NYC_OPTIONAL_EVENTS = "true"
  FEATURE_NYC_CALENDAR_SUBSCRIBE = "true"
  FEATURE_NYC_MAP_EMBEDS = "true"
  FEATURE_NYC_TRAVEL_BUS = "true"
  FEATURE_NYC_TRAVEL_MTA = "true"
  FEATURE_NYC_TRAVEL_MUSEUMS = "true"
  FEATURE_NYC_RSVP_ENABLED = "true"
  FEATURE_FRANCE_CALENDAR_SUBSCRIBE = "true"
  FEATURE_FRANCE_OPTIONAL_EXCURSIONS = "true"
  FEATURE_FRANCE_TRAVEL_RESTRUCTURED = "true"
  FEATURE_FRANCE_ACCOMMODATION_REQUEST = "true"
  FEATURE_FRANCE_EU_ALLERGENS = "true"
  FEATURE_FRANCE_LOCATION_MAP = "true"
  FEATURE_FRANCE_RSVP_ENABLED = "true"
  FEATURE_FRANCE_STAYING_OVERVIEW = "false"
  FEATURE_REGISTRY_ENABLED = "true"

# `netlify dev`: the Astro dev server runs on the project's sacred port 1213
# (astro.config.mjs `server.port`), NOT Astro's 4321 default — so point Netlify's
# targetPort at 1213, otherwise it waits forever on 4321. Netlify's proxy (which
# injects the Blobs context + edge functions) then listens on `port` (8888).
# Browse the proxy port to exercise Blobs/edge/redirects; the raw Astro server is
# still on 1213.
[dev]
  command = "npm run dev"
  framework = "#custom"
  targetPort = 1213
  port = 8888
  autoLaunch = false

# Fonts are loaded cross-origin by the Joy registry theme
# (docs/joy-custom-css/joy-theme.css), which requires CORS on font files.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://withjoy.com"

# NOTE: Global security headers (X-Frame-Options, Referrer-Policy,
# Permissions-Policy, CSP Report-Only) are set in src/middleware.ts, NOT here.
# Netlify [[headers]] rules only apply to statically-served files — never to
# function responses — and under the Netlify adapter every SSR page is served
# by a function, so a `for = "/*"` block here would miss all HTML.

# Preview deploys (PRs) add dev-only flags on top of production
[context.deploy-preview.environment]
  FEATURE_NYC_RSVP_PREVIEW = "true"
  FEATURE_FRANCE_STAYING_OVERVIEW = "false"
